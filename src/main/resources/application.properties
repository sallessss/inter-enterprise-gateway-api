spring.application.name=inter-enterprise-gateway
spring.config.import=optional:file:.env[.properties]
spring.profiles.active=${SPRING_PROFILES_ACTIVE:sandbox}
inter.client-id=${INTER_CLIENT_ID:}
inter.client-secret=${INTER_CLIENT_SECRET:}
inter.certificate-path=${INTER_CERTIFICATE_PATH:}
inter.private-key-path=${INTER_PRIVATE_KEY_PATH:}
inter.password=${INTER_PRIVATE_KEY_PASSWORD:}
inter.scope=${INTER_SCOPE:}
inter.base-url=${INTER_BASE_URL:}
inter.token-path=${INTER_TOKEN_PATH:/oauth/v2/token}
inter.connect-timeout-seconds=${INTER_CONNECT_TIMEOUT_SECONDS:10}
inter.certificate-required=${INTER_CERTIFICATE_REQUIRED:false}
